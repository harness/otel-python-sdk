name: Dispatch harness-sdk publish

on:
  push:
    tags:
      - "v*.*.*"
  release:
    types: [published, prereleased]

concurrency:
  group: dispatch-harness-sdk-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dispatch:
    name: Dispatch publish to pythonagent
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version from tag or release
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc.*)?$ ]]; then
            echo "Unsupported tag format: $TAG (expected vMAJOR.MINOR.PATCH with optional -rc suffix)"
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Trigger pythonagent harness-sdk publish
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: otel-sdk-publish-dispatcher.yaml
          repo: Traceableai/pythonagent
          ref: main
          token: ${{ secrets.GH_WORKFLOW_DISPATCH_PAT }}
          inputs: '{"version":"${{ steps.meta.outputs.version }}","ref":"${{ steps.meta.outputs.tag }}"}'
