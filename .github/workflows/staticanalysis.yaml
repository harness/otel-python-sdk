name: Static Analysis

on:
  schedule:
    - cron: "0 6 * * 0"
  pull_request:
  push:
    branches:
      - main

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: pip-audit (runtime dependencies)
        run: |
          python -m pip install --upgrade pip pip-audit
          python -c "import tomllib; from pathlib import Path; deps=tomllib.loads(Path('pyproject.toml').read_text())['project']['dependencies']; Path('requirements-ci.txt').write_text('\n'.join(d.split(';')[0].strip() for d in deps))"
          pip-audit -r requirements-ci.txt || true
