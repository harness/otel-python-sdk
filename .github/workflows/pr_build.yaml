name: build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build_artifacts:
    name: Build wheel and sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build setuptools wheel

      - name: Fetch vendor dependencies
        run: bash scripts/fetch-vendor.sh

      - name: Build distributions
        run: python -m build --outdir dist

      - uses: actions/upload-artifact@v4
        with:
          name: python-packages
          path: dist/*
          retention-days: 3

  build-and-test:
    runs-on: ubuntu-latest
    needs: build_artifacts
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-packages
          path: ./dist

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          WHEEL=$(ls dist/harness_sdk-*.whl | head -1)
          pip install "${WHEEL}[dev,anthropic,openai,litellm]"

      - name: Lint
        if: matrix.python-version == '3.12'
        run: |
          python -m pip install pylint
          python -m compileall -q src/harness_sdk
          pylint src/harness_sdk --disable=C,R --ignore-patterns=config_pb2.py

      - name: Start external services
        run: |
          cd test/externalServices
          docker compose up -d --wait

      - name: Unit tests
        run: |
          export RUN_SDK_INTEGRATION_TESTS=1
          python -m pytest --log-cli-level=INFO --tb=long
        env:
          PYTHONUNBUFFERED: 1
          HA_ENABLE_CONSOLE_SPAN_EXPORTER: "true"

      - name: Unit tests with coverage
        if: matrix.python-version == '3.12'
        run: |
          export RUN_SDK_INTEGRATION_TESTS=1
          python -m pytest --log-cli-level=INFO --tb=long \
            --cov=harness_sdk --cov-report=xml:coverage.xml --junitxml=pytest-report.xml
        env:
          PYTHONUNBUFFERED: 1
          HA_ENABLE_CONSOLE_SPAN_EXPORTER: "true"

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage.xml
            pytest-report.xml
          retention-days: 7
