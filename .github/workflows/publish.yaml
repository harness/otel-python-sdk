name: Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  id-token: write
  contents: read

jobs:
  build_artifacts:
    name: Build wheel and sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set version from tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          bash ./scripts/build.sh "${TAG_VERSION}"

      - name: Show version
        run: cat ./src/harness_sdk/version.py

      - name: Install build tools
        run: python -m pip install --upgrade pip build setuptools wheel

      - name: Fetch vendor dependencies
        run: bash scripts/fetch-vendor.sh

      - name: Build distributions
        run: python -m build --outdir dist

      - uses: actions/upload-artifact@v4
        with:
          name: python-packages
          path: dist/*
          retention-days: 7

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: [build_artifacts]
    if: contains(github.ref, '-rc')
    environment:
      name: testpypi
      url: https://test.pypi.org/p/harness-sdk
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-packages
          path: ./dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist
          verbose: true

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build_artifacts]
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-rc')
    environment:
      name: pypi
      url: https://pypi.org/p/harness-sdk
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-packages
          path: ./dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          verbose: true
