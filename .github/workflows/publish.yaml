name: Publish

on:
  push:
    tags:
      - "v*.*.*"
  release:
    types: [published]

concurrency:
  group: publish-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  build_artifacts:
    name: Build wheel and sdist
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve version from tag or release
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Unsupported tag format: $TAG (expected vMAJOR.MINOR.PATCH)"
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          bash ./scripts/build.sh "$VERSION"

      - name: Show version
        run: cat ./src/harness_sdk/version.py

      - name: Install build tools
        run: python -m pip install --upgrade pip build setuptools wheel

      - name: Fetch vendor dependencies
        run: bash scripts/fetch-vendor.sh

      - name: Build distributions
        run: python -m build --outdir dist

      - uses: actions/upload-artifact@v4
        with:
          name: python-packages
          path: dist/*
          retention-days: 7

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: [build_artifacts]
    if: contains(needs.build_artifacts.outputs.tag, '-rc')
    environment:
      name: testpypi
      url: https://test.pypi.org/p/harness-sdk
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-packages
          path: ./dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist
          verbose: true

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build_artifacts]
    if: "!contains(needs.build_artifacts.outputs.tag, '-rc')"
    environment:
      name: pypi
      url: https://pypi.org/p/harness-sdk
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-packages
          path: ./dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          verbose: true
